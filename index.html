<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/icon.ico" />
    <style>
      #startup-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #1f2937 0%, #0f172a 58%, #020617 100%);
        z-index: 9999;
        transition: opacity 220ms ease;
      }

      #startup-splash.hide {
        opacity: 0;
        pointer-events: none;
      }

      #startup-splash .splash-card {
        width: min(82vh, 82vw);
        aspect-ratio: 1 / 1;
        padding: 0;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.65);
        border: 1px solid rgba(148, 163, 184, 0.25);
        backdrop-filter: blur(6px);
        overflow: hidden;
        position: relative;
      }

      #startup-splash img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      #startup-splash .splash-caption {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 10px;
        font-size: 13px;
        color: rgba(226, 232, 240, 0.9);
        text-align: center;
        letter-spacing: 0.03em;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.75);
      }
    </style>
    <title>Sports Video Editor</title>
  </head>
  <body class="bg-surface text-white overflow-hidden">
    <div id="startup-splash" aria-hidden="true">
      <div class="splash-card">
        <img src="/splash.png" alt="Sports Video Editor" />
        <div class="splash-caption">Loading Sports Video Editor...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
